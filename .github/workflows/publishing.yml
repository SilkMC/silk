name: Publish release
on:
  push:
    branches:
      - publish
jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.6.0
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Gradle Properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2g" >> gradle.properties
          echo "signingKeyId=${{ secrets.SIGNING_KEY_ID }}" >> gradle.properties
          echo "signingKey=${{ secrets.SIGNING_KEY }}" >> gradle.properties
          echo "signingPassword=${{ secrets.SIGNING_PASSWORD }}" >> gradle.properties

      - name: Execute Gradle build
        run: ./gradlew build

      - name: Publish to Ossrh
        run: ./gradlew publishAllPublicationsToOssrhRepository -PossrhUsername=${{ secrets.OSSRH_USERNAME }} -PossrhPassword=${{ secrets.OSSRH_PASSWORD }}

      - name: Publish to Modrinth
        run: ./gradlew :silk-all:modrinth -Pmodrinth.token=${{ secrets.MODRINTH_TOKEN }}